services:
  - type: web
    name: coinhub-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: coinhub-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: coinhub-cache
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false

  - type: web
    name: coinhub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: coinhub-cache
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: coinhub-postgres
    plan: free
    databaseName: coinhub
    user: coinhub
